<!DOCTYPE html>

<style>

  .chevron-row.upcoming { opacity: 0.45; }

</style>

<script>
// ═══════════════════════════════════════════════
// DATA — Edit scores here during the trip
// ═══════════════════════════════════════════════

const TOTAL_POINTS = 48;
const POINTS_TO_WIN = 24.5;

const data = {
  red: { name: "Stiff Shaft Swingers", captain: "Luke Vandenbosch" },
  blue: { name: "Gaylord Gooners", captain: "Ryan Versolatto" },

  days: [

    },
    {

      rounds: [{
        format: "6-6-6", id: "666",
        detail: "2v2 Matchplay &bull; Scramble / Best Ball / Alt Shot &bull; 18 holes",
        pointsAvail: 8, status: "final",
        matches: [
          { label: "Match 1",
            red: [["Luke","Vandenbosch"],["Corey","Joosten"]], blue: [["Mike","Grimshaw"],["Ryan","Dixon"]],
            redPts: 0, bluePts: 2 },
          { label: "Match 2",
            red: [["Kyle","Elliott"],["Jesse","Joosten"]], blue: [["Andrew","Versolatto"],["Jeff","Hogg"]],
            redPts: 0, bluePts: 2 },
          { label: "Match 3",
            red: [["Nick","Grimshaw"],["William","Churchill"]], blue: [["Tyler","Barnwell"],["Josh","MacDonald"]],
            redPts: 2, bluePts: 0 },
          { label: "Match 4",
            red: [["Justin","Vere"],["Alex","Churchill"]], blue: [["Steve","Rioux"],["Ryan","Versolatto"]],
            redPts: 1, bluePts: 1 },
        ]
      }]
    },
    {
      day: 3, session: "AM", course: "Bay Harbor — Links / Quarry",
      rounds: [{
        format: "Blind Pairs", id: "bp",
        detail: "Singles → Paired by card draw &bull; 80% HCP &bull; 18 holes",
        pointsAvail: 4, status: "final",
        matches: [
          { label: "Jacks",
            red: [["Nick","Grimshaw"],["Corey","Joosten"]], blue: [["Ryan","Versolatto"],["Tyler","Barnwell"]],
            redPts: 1, bluePts: 0 },
          { label: "Queens",
            red: [["Justin","Vere"],["Alex","Churchill"]], blue: [["Steve","Rioux"],["Jeff","Hogg"]],
            redPts: 0, bluePts: 1 },
          { label: "Kings",
            red: [["Kyle","Elliott"],["William","Churchill"]], blue: [["Josh","MacDonald"],["Mike","Grimshaw"]],
            redPts: 1, bluePts: 0 },
          { label: "Aces",
            red: [["Luke","Vandenbosch"],["Jesse","Joosten"]], blue: [["Andrew","Versolatto"],["Ryan","Dixon"]],
            redPts: 0.5, bluePts: 0.5 },
        ]
      }]
    },
    {
      day: 3, session: "PM", course: "Bay Harbor — Preserve",
      rounds: [{
        format: "Worst Ball", id: "wb",
        detail: "8v8 &bull; Worst score counts &bull; 9 holes",
        pointsAvail: 4, status: "live", liveHole: "Hole 6 of 9",
        matches: [{
          label: "",
          red: [["Stiff Shaft","Swingers"]], blue: [["Gaylord","Gooners"]], isTeam: true,
          redPts: 0, bluePts: 0,
        }]
      }]
    },
    {
      day: 4, session: "AM", course: "Arthur Hills — Boyne Highlands",
      rounds: [{
        format: "1v1 Matchplay", id: "mp",
        detail: "8 individual matches &bull; 18 holes &bull; 3 pts each",
        pointsAvail: 24, status: "upcoming",
        matches: [
          { label: "Match 1", red: [["Justin","Vere"]], blue: [["Steve","Rioux"]], redPts: 0, bluePts: 0 },
          { label: "Match 2", red: [["Kyle","Elliott"]], blue: [["Andrew","Versolatto"]], redPts: 0, bluePts: 0 },
          { label: "Match 3", red: [["Nick","Grimshaw"]], blue: [["Josh","MacDonald"]], redPts: 0, bluePts: 0 },
          { label: "Match 4", red: [["William","Churchill"]], blue: [["Ryan","Versolatto"]], redPts: 0, bluePts: 0 },
          { label: "Match 5", red: [["Corey","Joosten"]], blue: [["Tyler","Barnwell"]], redPts: 0, bluePts: 0 },
          { label: "Match 6", red: [["Alex","Churchill"]], blue: [["Mike","Grimshaw"]], redPts: 0, bluePts: 0 },
          { label: "Match 7", red: [["Luke","Vandenbosch"]], blue: [["Ryan","Dixon"]], redPts: 0, bluePts: 0 },
          { label: "Match 8", red: [["Jesse","Joosten"]], blue: [["Jeff","Hogg"]], redPts: 0, bluePts: 0 },
        ]
      }]
    }
  ]
};

// ═══════════════════════════════════════════════
// COMPUTE
// ═══════════════════════════════════════════════

function computeTotals() {
  let redTotal = 0, blueTotal = 0, decided = 0, remaining = 0;
  data.days.forEach(day => day.rounds.forEach(round => {
    if (round.status === "upcoming") { remaining += round.pointsAvail; return; }
    round.matches.forEach(m => {
      redTotal += m.redPts; blueTotal += m.bluePts;
      decided += m.redPts + m.bluePts;
    });
    if (round.status === "live") {
      const pts = round.matches.reduce((s,m) => s + m.redPts + m.bluePts, 0);
      remaining += round.pointsAvail - pts;
    }
  }));
  return { redTotal, blueTotal, decided, remaining };
}

// ═══════════════════════════════════════════════
// CHEVRON SVG — only the winner gets a colored arrow
// ═══════════════════════════════════════════════

let svgIdx = 0;
// winner: "red", "blue", "halved", or "none"
function chevronSVG(winner, h) {
  const id = svgIdx++;
  const tip = 3.5; // chevron point size in viewBox units

  // Winner's arrow extends ~60% across, pushing into the loser's territory
  // Loser side: no arrow at all, just neutral bg
  let paths = '';

  if (winner === 'red') {
    // Red arrow from left, tip at ~62%
    const rEnd = 62;
    paths = `<path d="M0 0 L${rEnd-tip} 0 L${rEnd} ${h/2} L${rEnd-tip} ${h} L0 ${h}Z" fill="url(#rg${id})"/>`;
  } else if (winner === 'blue') {
    // Blue arrow from right, tip at ~38%
    const bStart = 38;
    paths = `<path d="M100 0 L${bStart+tip} 0 L${bStart} ${h/2} L${bStart+tip} ${h} L100 ${h}Z" fill="url(#bg${id})"/>`;
  } else if (winner === 'halved') {
    // Both arrows meet in the middle, even
    const mid = 50;
    paths = `
      <path d="M0 0 L${mid-tip-1} 0 L${mid-1} ${h/2} L${mid-tip-1} ${h} L0 ${h}Z" fill="url(#rg${id})" opacity="0.9"/>
      <path d="M100 0 L${mid+tip+1} 0 L${mid+1} ${h/2} L${mid+tip+1} ${h} L100 ${h}Z" fill="url(#bg${id})" opacity="0.9"/>
    `;
  }
  // winner === 'none': no colored arrows at all (upcoming/live)

  return `<svg viewBox="0 0 100 ${h}" preserveAspectRatio="none" style="width:100%;height:100%;display:block;">
    <defs>
      <linearGradient id="rg${id}" x1="0%" x2="100%"><stop offset="0%" stop-color="#9a1830"/><stop offset="100%" stop-color="#c41e3a"/></linearGradient>
      <linearGradient id="bg${id}" x1="0%" x2="100%"><stop offset="0%" stop-color="#003da5"/><stop offset="100%" stop-color="#002d7a"/></linearGradient>
    </defs>
    ${paths}
  </svg>`;
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════

function render() {
  const t = computeTotals();
  const redPct = (t.redTotal / TOTAL_POINTS) * 100;
  const bluePct = (t.blueTotal / TOTAL_POINTS) * 100;
  const redNeeds = Math.max(0, POINTS_TO_WIN - t.redTotal);
  const blueNeeds = Math.max(0, POINTS_TO_WIN - t.blueTotal);

  let projClass, projText;
  if (t.redTotal > t.blueTotal) {
    projClass = "red-leading";
    projText = `${data.red.name} lead by ${fp(t.redTotal - t.blueTotal)} — ${fp(t.remaining)} pts remaining`;
  } else if (t.blueTotal > t.redTotal) {
    projClass = "blue-leading";
    projText = `${data.blue.name} lead by ${fp(t.blueTotal - t.redTotal)} — ${fp(t.remaining)} pts remaining`;
  } else {
    projClass = "tied";
    projText = `All square — ${fp(t.remaining)} pts remaining`;
  }
  if (t.redTotal >= POINTS_TO_WIN) { projClass = "red-leading"; projText = `${data.red.name} have won the Ryder Cup!`; }
  else if (t.blueTotal >= POINTS_TO_WIN) { projClass = "blue-leading"; projText = `${data.blue.name} have won the Ryder Cup!`; }
  else if (redNeeds > t.remaining) { projClass = "blue-leading"; projText = `${data.blue.name} have clinched the Ryder Cup!`; }
  else if (blueNeeds > t.remaining) { projClass = "red-leading"; projText = `${data.red.name} have clinched the Ryder Cup!`; }

  // Responsive big number size
  const bigSize = window.innerWidth < 600 ? '3rem' : '4.5rem';
  const sepSize = window.innerWidth < 600 ? '1rem' : '1.5rem';

  let h = '';

  // ── MAIN SCORE ──
  h += `<div class="main-score">
    <div class="team-block">
      <div class="team-label red">${data.red.name}</div>
      <div class="big-number red" style="font-size:${bigSize}">${fp(t.redTotal)}</div>
    </div>
    <div class="score-sep" style="font-size:${sepSize}">&ndash;</div>
    <div class="team-block">
      <div class="team-label blue">${data.blue.name}</div>
      <div class="big-number blue" style="font-size:${bigSize}">${fp(t.blueTotal)}</div>
    </div>
  </div>`;

  // ── MASTER BAR ──
  h += `<div class="master-bar-wrap"><div class="master-bar">
    <div class="win-marker">24.5 TO WIN</div><div class="win-line"></div>
    <div class="red-fill" style="width:${redPct}%">${redPct>5?`<span class="bar-label">${fp(t.redTotal)}</span>`:''}</div>
    <div class="remaining"></div>
    <div class="blue-fill" style="width:${bluePct}%">${bluePct>5?`<span class="bar-label">${fp(t.blueTotal)}</span>`:''}</div>
  </div></div>`;

  // ── STATUS ──
  h += `<div class="status-wrap"><div class="status-strip">
    <div class="status-item"><div class="status-label">Red Needs</div><div class="status-value red">${fp(redNeeds)}</div></div>
    <div class="status-item"><div class="status-label">Decided</div><div class="status-value neutral">${fp(t.decided)} / ${TOTAL_POINTS}</div></div>
    <div class="status-item"><div class="status-label">Remaining</div><div class="status-value gold">${fp(t.remaining)}</div></div>
    <div class="status-item"><div class="status-label">Blue Needs</div><div class="status-value blue">${fp(blueNeeds)}</div></div>
  </div></div>`;

  // ── PROJECTION ──
  h += `<div class="proj-wrap"><div class="projection ${projClass}">${projText}</div></div>`;

  // ── MATCHES ──
  h += `<div class="content">`;

  data.days.forEach(day => {
    h += `<div class="day-header">
      <span class="day-label">Day ${day.day} &bull; ${day.session}</span>
      <span class="day-line"></span>
      <span class="day-course">${day.course}</span>
    </div>`;

    day.rounds.forEach(round => {
      const sLabel = round.status === 'final' ? 'Final' : round.status === 'live' ? `● Live — ${round.liveHole||''}` : 'Upcoming';
      const sClass = round.status === 'live' ? 'live' : '';

      h += `<div class="match-card">
        <div class="match-header">
          <div><span class="match-format">${round.format}</span><span class="match-pts-badge">${round.pointsAvail} PTS</span></div>
          <span class="match-status ${sClass}">${sLabel}</span>
        </div>
        <div class="match-detail">${round.detail}</div>
        <div class="chevron-matches">`;

      round.matches.forEach(m => {
        const isUp = round.status === 'upcoming';
        const isLive = round.status === 'live';
        const isHalved = m.redPts === m.bluePts && m.redPts > 0;
        const numPlayers = Math.max(m.red.length, m.blue.length);

        // Row height based on player count
        const rowH = numPlayers <= 1 ? 48 : numPlayers <= 2 ? 62 : 82;

        // Determine winner for chevron
        let winner = 'none'; // upcoming / live
        if (!isUp && !isLive) {
          if (m.redPts > m.bluePts) winner = 'red';
          else if (m.bluePts > m.redPts) winner = 'blue';
          else if (m.redPts > 0) winner = 'halved';
        }

        const cls = `chevron-row${isUp?' upcoming':''}${isHalved?' halved':''}`;

        h += `<div class="${cls}" style="height:${rowH}px">`;

        // SVG background — only winner gets the colored arrow
        h += `<div style="position:absolute;inset:0;z-index:1">${chevronSVG(winner, rowH)}</div>`;

        // Red names (left)
        h += `<div class="chev-names left">`;
        m.red.forEach(p => h += `<div class="chev-player">${m.isTeam ? p[1] : p[0][0]+'. '+p[1]}</div>`);
        h += `</div>`;

        // Blue names (right)
        h += `<div class="chev-names right">`;
        m.blue.forEach(p => h += `<div class="chev-player">${m.isTeam ? p[1] : p[0][0]+'. '+p[1]}</div>`);
        h += `</div>`;

        // Center: just the Ryder Cup points
        h += `<div class="chev-center">`;
        if (isLive) h += `<div class="chev-live-dot">● LIVE</div>`;
        if (m.label) h += `<div class="chev-match-label">${m.label}</div>`;

        if (isUp) {
          h += `<div class="chev-pts" style="color:var(--text-muted);font-size:0.85rem">TBD</div>`;
        } else if (isLive) {
          h += `<div class="chev-pts" style="color:var(--text-muted);font-size:0.85rem">IN PLAY</div>`;
        } else {
          h += `<div class="chev-pts"><span class="r">${fp(m.redPts)}</span><span class="s">:</span><span class="b">${fp(m.bluePts)}</span></div>`;
          // Outcome label
          let oc = '';
          if (m.redPts > m.bluePts) oc = 'RED WIN';
          else if (m.bluePts > m.redPts) oc = 'BLUE WIN';
          else if (m.redPts > 0) oc = 'HALVED';
          if (oc) h += `<div class="chev-outcome" style="color:rgba(255,255,255,0.8)">${oc}</div>`;
        }
        h += `</div>`; // chev-center

        h += `</div>`; // chevron-row
      });

      h += `</div></div>`; // chevron-matches, match-card
    });
  });

  h += `</div>`; // content
  document.getElementById('app').innerHTML = h;
}

function fp(n) { return n % 1 === 0.5 ? n.toFixed(1) : String(n); }

render();
window.addEventListener('resize', render);
</script>
</body>
</html>
