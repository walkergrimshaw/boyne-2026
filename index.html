<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boyne 2026 — Scoreboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --red: #c41e3a;
    --red-dark: #9a1830;
    --red-light: #e8344f;
    --blue: #003da5;
    --blue-dark: #002d7a;
    --blue-light: #1a5fd4;
    --gold: #d4a843;
    --bg: #0a0e14;
    --bg-card: #131a24;
    --bg-card-2: #182230;
    --text: #e8edf3;
    --text-muted: #7a8ba3;
    --border: #1e2d3d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HERO ── */
  .hero {
    background: linear-gradient(180deg, #0f1520 0%, var(--bg) 100%);
    padding: 2rem 1.5rem 0.5rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .hero-title {
    font-family: 'Oswald', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.15rem;
  }
  .hero-event {
    font-family: 'Oswald', sans-serif;
    font-size: 3rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text);
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  /* ── TABS ── */
  .tabs-wrap {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .tabs {
    max-width: 900px; margin: 0 auto;
    display: flex; gap: 0;
  }
  .tab-btn {
    flex: 1;
    padding: 0.85rem 0.5rem;
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    font-family: 'Oswald', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  .view { display: none; }
  .view.active { display: block; }

  /* ── MASSIVE SCORE (Ryder) ── */
  .main-score {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.25rem;
    margin-bottom: 1.25rem;
    padding: 1.5rem 0 0.5rem;
  }
  .team-block { text-align: center; flex: 0 0 auto; min-width: 160px; }
  .team-label {
    font-family: 'Oswald', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .team-label.red { color: var(--red-light); }
  .team-label.blue { color: var(--blue-light); }
  .big-number {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    line-height: 1;
  }
  .big-number.red { color: var(--red); }
  .big-number.blue { color: var(--blue); }
  .score-sep {
    font-family: 'Oswald', sans-serif;
    color: var(--text-muted);
    align-self: flex-end;
  }

  /* ── MASTER BAR ── */
  .master-bar-wrap { max-width: 900px; margin: 0 auto; padding: 0 1.5rem; margin-bottom: 0.4rem; }
  .master-bar {
    height: 72px;
    border-radius: 36px;
    overflow: hidden;
    display: flex;
    background: var(--bg-card);
    border: 1px solid var(--border);
    position: relative;
  }
  .master-bar .red-fill {
    background: linear-gradient(90deg, var(--red-dark), var(--red));
    height: 100%;
    transition: width 0.8s ease;
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 16px; min-width: 50px;
  }
  .master-bar .blue-fill {
    background: linear-gradient(90deg, var(--blue), var(--blue-dark));
    height: 100%;
    transition: width 0.8s ease;
    display: flex; align-items: center; justify-content: flex-start;
    padding-left: 16px; min-width: 50px;
  }
  .master-bar .remaining {
    flex: 1;
    background: repeating-linear-gradient(-45deg, transparent, transparent 4px, rgba(255,255,255,0.02) 4px, rgba(255,255,255,0.02) 8px);
  }
  .master-bar .bar-label {
    font-family: 'Oswald', sans-serif;
    margin-top: -2px;
    font-size: 2.2rem;
    font-weight: 700;
    color: white;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }
  .master-bar .win-line {
    position: absolute; left: 50%; top: -4px; bottom: -4px; width: 2px; background: var(--gold); z-index: 10;
  }
  .master-bar .win-marker {
    position: absolute; left: 50%; transform: translateX(-50%); top: -18px;
    font-family: 'Oswald', sans-serif; font-size: 0.55rem; font-weight: 600;
    color: var(--gold); letter-spacing: 0.1em; white-space: nowrap;
  }

  /* ── STATUS STRIP ── */
  .status-wrap { max-width: 900px; margin: 0 auto; padding: 0 1.5rem; }
  .status-strip {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.6rem 0; border-bottom: 1px solid var(--border); margin-bottom: 0.5rem;
  }
  .status-item { text-align: center; }
  .status-label {
    font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.1rem;
  }
  .status-value { font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 600; }
  .status-value.red { color: var(--red-light); }
  .status-value.blue { color: var(--blue-light); }
  .status-value.gold { color: var(--gold); }
  .status-value.neutral { color: var(--text); }

  /* ── PROJECTION ── */
  .proj-wrap { max-width: 900px; margin: 0 auto; padding: 0 1.5rem; }
  .projection {
    text-align: center; padding: 0.5rem 1rem; border-radius: 8px; margin-bottom: 1rem;
    font-family: 'Oswald', sans-serif; font-size: 0.8rem; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .projection.red-leading {
    background: linear-gradient(90deg, rgba(196,30,58,0.15), rgba(196,30,58,0.05));
    border: 1px solid rgba(196,30,58,0.3); color: var(--red-light);
  }
  .projection.blue-leading {
    background: linear-gradient(90deg, rgba(0,61,165,0.05), rgba(0,61,165,0.15));
    border: 1px solid rgba(0,61,165,0.3); color: var(--blue-light);
  }
  .projection.tied {
    background: linear-gradient(90deg, rgba(212,168,67,0.05), rgba(212,168,67,0.1), rgba(212,168,67,0.05));
    border: 1px solid rgba(212,168,67,0.3); color: var(--gold);
  }
  .host-divider {
    max-width: 900px; margin: 0.5rem auto 1.5rem; padding: 0 1.5rem;
  }
  .host-divider-bar {
    text-align: center; padding: 0.6rem 1rem; border-radius: 8px;
    font-family: 'Oswald', sans-serif; font-size: 0.85rem; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .host-divider-bar.red {
    background: linear-gradient(90deg, rgba(196,30,58,0.18), rgba(196,30,58,0.06));
    border: 1px solid rgba(196,30,58,0.35); color: var(--red-light);
  }
  .host-divider-bar.blue {
    background: linear-gradient(90deg, rgba(0,61,165,0.06), rgba(0,61,165,0.18));
    border: 1px solid rgba(0,61,165,0.35); color: var(--blue-light);
  }
  .host-divider-bar.flip {
    background: linear-gradient(90deg, rgba(212,168,67,0.05), rgba(212,168,67,0.12), rgba(212,168,67,0.05));
    border: 1px solid rgba(212,168,67,0.35); color: var(--gold);
  }

  /* ── CONTENT AREA ── */
  .content { max-width: 900px; margin: 0 auto; padding: 0 1.5rem 2rem; }

  /* ── DAY HEADERS ── */
  .day-header {
    display: flex; align-items: center; gap: 0.75rem; margin: 1.5rem 0 0.6rem;
  }
  .day-header .day-label {
    font-family: 'Oswald', sans-serif; font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); white-space: nowrap;
  }
  .day-header .day-line { flex: 1; height: 1px; background: var(--border); }
  .day-header .day-course {
    font-size: 0.6rem; color: var(--text-muted); letter-spacing: 0.05em; white-space: nowrap;
  }

  /* ── MATCH CARDS ── */
  .match-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
    padding: 0.75rem 0.85rem; margin-bottom: 0.5rem;
  }
  .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.35rem; }
  .match-format {
    font-family: 'Oswald', sans-serif; font-size: 0.75rem; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase; color: var(--text);
  }
  .match-pts-badge {
    font-family: 'Oswald', sans-serif; font-size: 0.6rem; font-weight: 500;
    padding: 0.1rem 0.45rem; border-radius: 10px;
    background: rgba(212,168,67,0.12); color: var(--gold); letter-spacing: 0.05em; margin-left: 0.4rem;
  }
  .match-status { font-size: 0.6rem; color: var(--text-muted); font-weight: 500; }
  .match-status.live { color: #4ade80; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .match-detail { font-size: 0.6rem; color: var(--text-muted); margin-bottom: 0.5rem; }

  /* ── CHEVRON ROWS ── */
  .chevron-matches { display: flex; flex-direction: column; gap: 0.5rem; }
  .chevron-row {
    position: relative; display: flex; align-items: stretch;
    border-radius: 6px; overflow: hidden; background: rgba(255,255,255,0.03);
  }
  .chev-names {
    position: absolute; top: 0; bottom: 0; display: flex; flex-direction: column;
    justify-content: center; padding: 0.25rem 0.65rem; z-index: 5; gap: 0.05rem;
  }
  .chev-names.left { left: 0; text-align: left; }
  .chev-names.right { right: 0; text-align: right; }
  .chev-player { font-size: 0.75rem; font-weight: 700; color: #fff; line-height: 1.3; }
  .chev-roster {
    font-size: 0.55rem; font-weight: 400; color: rgba(255,255,255,0.65);
    line-height: 1.35; margin-top: 0.15rem; max-width: 180px;
  }
  .chev-names.left .chev-roster { text-align: left; }
  .chev-names.right .chev-roster { text-align: right; }
  .chev-roster .rname { white-space: nowrap; }
  .chev-center {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
    z-index: 10; text-align: center; pointer-events: none;
  }
  .chev-match-label {
    font-family: 'Oswald', sans-serif; font-size: 0.55rem; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.75);
    text-shadow: 0 1px 4px rgba(0,0,0,0.9); margin-bottom: 0.1rem;
  }
  .chev-pts {
    font-family: 'Oswald', sans-serif; font-size: 1.2rem; font-weight: 700;
    text-shadow: 0 2px 6px rgba(0,0,0,0.9); line-height: 1;
  }
  .chev-pts .r { color: #fff; }
  .chev-pts .s { color: rgba(255,255,255,0.7); padding: 0 0.1rem; font-size: 0.9rem; }
  .chev-pts .b { color: #fff; }
  .chev-outcome {
    font-family: 'Oswald', sans-serif; font-size: 0.5rem; font-weight: 600;
    letter-spacing: 0.08em; text-shadow: 0 1px 4px rgba(0,0,0,0.9); margin-top: 0.05rem;
  }
  .chev-live-dot {
    position: absolute; top: 3px; left: 50%; transform: translateX(-50%); z-index: 11;
    font-size: 0.45rem; font-weight: 600; color: #4ade80;
    letter-spacing: 0.08em; text-transform: uppercase;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9); animation: pulse 2s infinite;
  }
  .match-card.upcoming { opacity: 0.5; }
  .side-card.upcoming  { opacity: 0.5; }

  /* ── BOYNE CUP / FEDEX TAB ── */
  .boyne-intro { max-width: 900px; margin: 0 auto; padding: 1.5rem 1.5rem 0.75rem; text-align: center; }
  .boyne-intro h2 {
    font-family: 'Oswald', sans-serif; font-size: 2rem; font-weight: 700;
    letter-spacing: 0.05em; text-transform: uppercase; color: var(--gold);
  }
  .boyne-intro p {
    font-size: 0.75rem; color: var(--text-muted); margin-top: 0.3rem;
  }
  .fedex-table {
    width: 100%; border-collapse: collapse; margin-top: 0.5rem;
    background: var(--bg-card); border-radius: 10px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .fedex-table th {
    font-family: 'Oswald', sans-serif; font-size: 0.6rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted);
    padding: 0.6rem 0.5rem; text-align: left; border-bottom: 1px solid var(--border);
    background: var(--bg-card-2);
  }
  .fedex-table th.num, .fedex-table td.num { text-align: center; }
  .fedex-table th.right, .fedex-table td.right { text-align: right; padding-right: 0.85rem; }
  .fedex-table td {
    padding: 0.55rem 0.5rem; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .fedex-table tr:last-child td { border-bottom: none; }
  .fedex-table .rank {
    font-family: 'Oswald', sans-serif; font-weight: 700; color: var(--text-muted);
    width: 40px; text-align: center;
  }
  .fedex-table .rank.top { color: var(--gold); }
  .fedex-table .player { font-weight: 600; }
  .champ-badge {
    display: inline-block;
    margin-left: 0.4rem;
    padding: 0.05rem 0.4rem;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: #1a1a1a;
    background: var(--gold);
    border-radius: 3px;
    vertical-align: middle;
  }
  .fedex-table .team-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 0.5rem; vertical-align: middle;
  }
  .fedex-table .team-dot.red { background: var(--red); }
  .fedex-table .team-dot.blue { background: var(--blue); }
  .fedex-table .total {
    font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 1rem;
  }
  .fedex-table .strokes {
    font-family: 'Oswald', sans-serif; font-weight: 600; color: var(--gold);
  }
  .fedex-table .strokes.zero { color: var(--text-muted); }

  .fedex-legend {
    max-width: 900px; margin: 1rem auto 0; padding: 0.75rem 1rem;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    font-size: 0.7rem; color: var(--text-muted); line-height: 1.5;
  }
  .fedex-legend strong { color: var(--text); font-weight: 600; }

  /* ── SIDE ACTION TAB ── */
  .side-intro { max-width: 900px; margin: 0 auto; padding: 1.5rem 1.5rem 0.5rem; text-align: center; }
  .side-intro h2 {
    font-family: 'Oswald', sans-serif; font-size: 2rem; font-weight: 700;
    letter-spacing: 0.05em; text-transform: uppercase; color: var(--gold);
  }
  .side-intro p {
    font-size: 0.75rem; color: var(--text-muted); margin-top: 0.3rem;
  }

  .side-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
    padding: 0.85rem 0.95rem; margin-bottom: 0.6rem;
  }
  .side-card-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 0.4rem;
  }
  .side-card-format {
    font-family: 'Oswald', sans-serif; font-size: 0.85rem; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase; color: var(--text);
  }
  .side-card-status { font-size: 0.6rem; color: var(--text-muted); font-weight: 500; }
  .side-card-status.final { color: var(--gold); }
  .side-card-detail { font-size: 0.6rem; color: var(--text-muted); margin-bottom: 0.7rem; }

  .side-section {
    margin-top: 0.65rem; padding-top: 0.55rem; border-top: 1px solid rgba(255,255,255,0.06);
  }
  .side-section:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }
  .side-section-label {
    font-family: 'Oswald', sans-serif; font-size: 0.6rem; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold);
    margin-bottom: 0.4rem;
  }
  .side-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 0.4rem 0; font-size: 0.8rem;
  }
  .side-row + .side-row { border-top: 1px dashed rgba(255,255,255,0.05); }
  .side-row .label-l {
    color: var(--text-muted); font-size: 0.7rem; min-width: 70px;
    padding-top: 0.05rem;
  }
  .side-row .player-block {
    flex: 1; padding: 0 0.5rem; min-width: 0;
  }
  .side-row .player {
    font-weight: 600; color: var(--text); line-height: 1.25;
  }
  .side-row .sponsor {
    font-size: 0.62rem; color: var(--text-muted); line-height: 1.35;
    margin-top: 0.15rem; font-style: italic;
  }
  .side-row .meta {
    font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 0.85rem;
    color: var(--gold); white-space: nowrap; padding-top: 0.05rem;
  }
  .side-empty {
    font-size: 0.7rem; color: var(--text-muted); font-style: italic;
    padding: 0.25rem 0;
  }

  /* Skins table layout */
  .skins-header, .skins-row {
    display: flex; align-items: center; padding: 0.4rem 0;
  }
  .skins-header {
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding-bottom: 0.3rem; margin-bottom: 0.1rem;
  }
  .skins-row + .skins-row { border-top: 1px dashed rgba(255,255,255,0.05); }
  .sk-player { flex: 1; font-weight: 600; color: var(--text); font-size: 0.8rem; }
  .sk-count {
    width: 70px; text-align: center; font-weight: 600;
    color: var(--text); font-size: 0.85rem;
    font-family: 'Oswald', sans-serif;
  }
  .sk-payout {
    width: 80px; text-align: right; font-family: 'Oswald', sans-serif;
    font-weight: 600; font-size: 0.85rem; color: var(--gold);
  }
  .skins-header .sk-player,
  .skins-header .sk-count,
  .skins-header .sk-payout {
    font-size: 0.55rem; font-weight: 500; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.1em;
    font-family: 'Inter', sans-serif;
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center; padding: 1.5rem 1rem; font-size: 0.6rem;
    color: var(--text-muted); letter-spacing: 0.05em;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .hero-title { font-size: 0.7rem; }
    .hero-event { font-size: 1.9rem; }
    .big-number { font-size: 5rem !important; }
    .score-sep { font-size: 1.5rem !important; }
    .main-score { gap: 0.75rem; }
    .team-block { min-width: 100px; }
    .status-strip { flex-wrap: nowrap; }
    .status-item { flex: 1 1 25%; min-width: 0; }
    .chev-player { font-size: 0.65rem; }
    .chev-pts { font-size: 1rem; }
    .tab-btn { font-size: 0.7rem; padding: 0.7rem 0.3rem; letter-spacing: 0.05em; }
    .fedex-table th, .fedex-table td { padding: 0.45rem 0.35rem; font-size: 0.75rem; }
    .fedex-table .total { font-size: 0.85rem; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-title">Boyne Golf Trip &bull; May 11&ndash;15, 2026</div>
  <div class="hero-event">Boyne 2026</div>
</div>

<div class="tabs-wrap"><div class="tabs">
  <button class="tab-btn active" data-tab="ryder">Ryder Cup</button>
  <button class="tab-btn" data-tab="boyne">Boyne Cup</button>
  <button class="tab-btn" data-tab="side">Side Action</button>
</div></div>

<div id="view-ryder" class="view active"></div>
<div id="view-boyne" class="view"></div>
<div id="view-side" class="view"></div>

<div class="footer">Boyne 2026 &bull; One source of truth</div>

<script>
// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════

const TOTAL_POINTS = 48;
const POINTS_TO_WIN = 24.5;

// ═══════════════════════════════════════════════
// RYDER CUP DATA
// ═══════════════════════════════════════════════

const data = {
  red: { name: "Stiff Shaft Swingers", captain: "Luke Vandenbosch" },
  blue: { name: "Gaylord Gooners", captain: "Ryan Versolatto" },

  days: [
    {
      day: 1, session: "PM", course: "The Monument — Boyne Mountain",
      rounds: [{
        format: "Irish Rumble", id: "ir",
        detail: "8v8 &bull; Escalating count &bull; 18 holes",
        pointsAvail: 4, status: "upcoming",
        matches: [{

// ═══════════════════════════════════════════════
// COMPUTE
// ═══════════════════════════════════════════════

function computeTotals() {
  let redTotal = 0, blueTotal = 0, decided = 0, remaining = 0;
  data.days.forEach(day => day.rounds.forEach(round => {
    if (round.status === "upcoming") { remaining += round.pointsAvail; return; }
    round.matches.forEach(m => {
      redTotal += m.redPts; blueTotal += m.bluePts;
      decided += m.redPts + m.bluePts;
    });
    if (round.status === "live") {
      const pts = round.matches.reduce((s,m) => s + m.redPts + m.bluePts, 0);
      remaining += round.pointsAvail - pts;
    }
  }));
  return { redTotal, blueTotal, decided, remaining };
}

function fp(n) { return n % 1 === 0.5 ? n.toFixed(1) : String(n); }

// ═══════════════════════════════════════════════
// CHEVRON SVG
// ═══════════════════════════════════════════════

let svgIdx = 0;
function chevronSVG(winner, h) {
  const id = svgIdx++;
  const tip = 3.5;
  let paths = '';
  if (winner === 'red') {
    // Winner extends 15% further into opponent territory (62 → 77)
    const rEnd = 77;
    paths = `<path d="M0 0 L${rEnd-tip} 0 L${rEnd} ${h/2} L${rEnd-tip} ${h} L0 ${h}Z" fill="url(#rg${id})"/>`;
  } else if (winner === 'blue') {
    const bStart = 23;
    paths = `<path d="M100 0 L${bStart+tip} 0 L${bStart} ${h/2} L${bStart+tip} ${h} L100 ${h}Z" fill="url(#bg${id})"/>`;
  } else if (winner === 'halved') {
    // Halved: flat 50/50 split, no chevron tips, dimmed to de-emphasize
    paths = `
      <rect x="0" y="0" width="50" height="${h}" fill="url(#rg${id})"/>
      <rect x="50" y="0" width="50" height="${h}" fill="url(#bg${id})"/>
    `;
  }
  return `<svg viewBox="0 0 100 ${h}" preserveAspectRatio="none" style="width:100%;height:100%;display:block;">
    <defs>
      <linearGradient id="rg${id}" x1="0%" x2="100%"><stop offset="0%" stop-color="#9a1830"/><stop offset="100%" stop-color="#c41e3a"/></linearGradient>
      <linearGradient id="bg${id}" x1="0%" x2="100%"><stop offset="0%" stop-color="#003da5"/><stop offset="100%" stop-color="#002d7a"/></linearGradient>
    </defs>
    ${paths}
  </svg>`;
}

function renderRyder() {
  const t = computeTotals();
  const redPct = (t.redTotal / TOTAL_POINTS) * 100;
  const bluePct = (t.blueTotal / TOTAL_POINTS) * 100;
  const redNeeds = Math.max(0, POINTS_TO_WIN - t.redTotal);
  const blueNeeds = Math.max(0, POINTS_TO_WIN - t.blueTotal);

  let projClass, projText;
  if (t.redTotal > t.blueTotal) {
    projClass = "red-leading";
    projText = `${data.red.name} lead by ${fp(t.redTotal - t.blueTotal)} — ${fp(t.remaining)} pts remaining`;
  } else if (t.blueTotal > t.redTotal) {
    projClass = "blue-leading";
    projText = `${data.blue.name} lead by ${fp(t.blueTotal - t.redTotal)} — ${fp(t.remaining)} pts remaining`;
  } else {
    projClass = "tied";
    projText = `All square — ${fp(t.remaining)} pts remaining`;
  }
  if (t.redTotal >= POINTS_TO_WIN) { projClass = "red-leading"; projText = `${data.red.name} have won the Ryder Cup!`; }
  else if (t.blueTotal >= POINTS_TO_WIN) { projClass = "blue-leading"; projText = `${data.blue.name} have won the Ryder Cup!`; }
  else if (redNeeds > t.remaining) { projClass = "blue-leading"; projText = `${data.blue.name} have clinched the Ryder Cup!`; }
  else if (blueNeeds > t.remaining) { projClass = "red-leading"; projText = `${data.red.name} have clinched the Ryder Cup!`; }

  const bigSize = window.innerWidth < 600 ? '3rem' : '4.5rem';
  const sepSize = window.innerWidth < 600 ? '1rem' : '1.5rem';

  let h = '';

  h += `<div class="main-score">
    <div class="team-block">
      <div class="team-label red">${data.red.name}</div>
      <div class="big-number red" style="font-size:${bigSize}">${fp(t.redTotal)}</div>
    </div>
    <div class="score-sep" style="font-size:${sepSize}">&ndash;</div>
    <div class="team-block">
      <div class="team-label blue">${data.blue.name}</div>
      <div class="big-number blue" style="font-size:${bigSize}">${fp(t.blueTotal)}</div>
    </div>
  </div>`;

  h += `<div class="master-bar-wrap"><div class="master-bar">
    <div class="win-marker">24.5 TO WIN</div><div class="win-line"></div>
    <div class="red-fill" style="width:${redPct}%">${redPct>5?`<span class="bar-label">${fp(t.redTotal)}</span>`:''}</div>
    <div class="remaining"></div>
    <div class="blue-fill" style="width:${bluePct}%">${bluePct>5?`<span class="bar-label">${fp(t.blueTotal)}</span>`:''}</div>
  </div></div>`;

  h += `<div class="status-wrap"><div class="status-strip">
    <div class="status-item"><div class="status-label">Red Needs</div><div class="status-value red">${fp(redNeeds)}</div></div>
    <div class="status-item"><div class="status-label">Decided</div><div class="status-value neutral">${fp(t.decided)} / ${TOTAL_POINTS}</div></div>
    <div class="status-item"><div class="status-label">Remaining</div><div class="status-value gold">${fp(t.remaining)}</div></div>
    <div class="status-item"><div class="status-label">Blue Needs</div><div class="status-value blue">${fp(blueNeeds)}</div></div>
  </div></div>`;

  h += `<div class="proj-wrap"><div class="projection ${projClass}">${projText}</div></div>`;

  h += `<div class="content">`;

  // Group entries by day number for host-divider logic
  const byDay = {};
  data.days.forEach(e => { (byDay[e.day] = byDay[e.day] || []).push(e); });
  const dayStatus = (d) => {
    const entries = byDay[d] || [];
    if (!entries.length) return 'none';
    const allFinal = entries.every(e => e.rounds.every(r => r.status === 'final'));
    const anyStarted = entries.some(e => e.rounds.some(r => r.status === 'live' || r.status === 'final'));
    if (allFinal) return 'final';
    if (anyStarted) return 'live';
    return 'upcoming';
  };
  const dayPoints = (d) => {
    let r = 0, b = 0;
    (byDay[d] || []).forEach(e => e.rounds.forEach(rd => rd.matches.forEach(m => { r += m.redPts; b += m.bluePts; })));
    return { red: r, blue: b };
  };
  const DAY_NAMES = { 1: 'Monday', 2: 'Tuesday', 3: 'Wednesday', 4: 'Thursday' };

  data.days.forEach((day, i) => {
    h += `<div class="day-header">
      <span class="day-label">Day ${day.day} &bull; ${day.session}</span>
      <span class="day-line"></span>
      <span class="day-course">${day.course}</span>
    </div>`;

    day.rounds.forEach(round => {
      const sLabel = round.status === 'final' ? 'Final' : round.status === 'live' ? `● Live — ${round.liveHole||''}` : 'Upcoming';
      const sClass = round.status === 'live' ? 'live' : '';

      h += `<div class="match-card${round.status==='upcoming'?' upcoming':''}">
        <div class="match-header">
          <div><span class="match-format">${round.format}</span><span class="match-pts-badge">${round.pointsAvail} PTS</span></div>
          <span class="match-status ${sClass}">${sLabel}</span>
        </div>
        <div class="match-detail">${round.detail}</div>
        <div class="chevron-matches">`;

      round.matches.forEach(m => {
        const isUp = round.status === 'upcoming';
        const isLive = round.status === 'live';
        const isHalved = m.redPts === m.bluePts && m.redPts > 0;
        const numPlayers = Math.max(m.red.length, m.blue.length);
        const hasRoster = !!(m.redRoster || m.blueRoster);
        const rowH = hasRoster ? 92 : (numPlayers <= 1 ? 48 : numPlayers <= 2 ? 62 : 82);

        let winner = 'none';
        if (!isUp && !isLive) {
          if (m.redPts > m.bluePts) winner = 'red';
          else if (m.bluePts > m.redPts) winner = 'blue';
          else if (m.redPts > 0) winner = 'halved';
        }

        const cls = `chevron-row`;
        h += `<div class="${cls}" style="height:${rowH}px">`;
        h += `<div style="position:absolute;inset:0;z-index:1">${chevronSVG(winner, rowH)}</div>`;
        h += `<div class="chev-names left">`;
        m.red.forEach(p => h += `<div class="chev-player">${m.isTeam ? p[1] : p[0][0]+'. '+p[1]}</div>`);
        if (m.redRoster) h += `<div class="chev-roster">${m.redRoster.map(n => `<span class="rname">${n}</span>`).join(' &bull; ')}</div>`;
        h += `</div>`;
        h += `<div class="chev-names right">`;
        m.blue.forEach(p => h += `<div class="chev-player">${m.isTeam ? p[1] : p[0][0]+'. '+p[1]}</div>`);
        if (m.blueRoster) h += `<div class="chev-roster">${m.blueRoster.map(n => `<span class="rname">${n}</span>`).join(' &bull; ')}</div>`;
        h += `</div>`;
        h += `<div class="chev-center">`;
        if (isLive) h += `<div class="chev-live-dot">● LIVE</div>`;
        if (m.label) h += `<div class="chev-match-label">${m.label}</div>`;
        if (isUp) {
          h += `<div class="chev-pts" style="color:var(--text-muted);font-size:0.85rem">TBD</div>`;
        } else if (isLive) {
          h += `<div class="chev-pts" style="color:var(--text-muted);font-size:0.85rem">IN PLAY</div>`;
        } else {
          h += `<div class="chev-pts"><span class="r">${fp(m.redPts)}</span><span class="s">:</span><span class="b">${fp(m.bluePts)}</span></div>`;
          let oc = '';
          if (m.redPts > m.bluePts) oc = 'RED WIN';
          else if (m.bluePts > m.redPts) oc = 'BLUE WIN';
          else if (m.redPts > 0) oc = 'HALVED';
          if (oc) h += `<div class="chev-outcome" style="color:rgba(255,255,255,0.8)">${oc}</div>`;
        }
        h += `</div></div>`;
      });

      h += `</div></div>`;
    });

    // Host divider: render after the LAST entry of a day, only if that day is final AND next day hasn't started
    const isLastEntryOfDay = (i === data.days.length - 1) || (data.days[i+1].day !== day.day);
    if (isLastEntryOfDay) {
      const nextDayStatus = dayStatus(day.day + 1);
      if (dayStatus(day.day) === 'final' && (nextDayStatus === 'upcoming' || nextDayStatus === 'none')) {
        const pts = dayPoints(day.day);
        const dn = DAY_NAMES[day.day] || `Day ${day.day}`;
        let barCls, barText;
        if (pts.red > pts.blue) {
          barCls = 'blue';
          barText = `${dn} hosts: ${data.blue.name} 🏠 &nbsp;&bull;&nbsp; ${fp(pts.red)}–${fp(pts.blue)}`;
        } else if (pts.blue > pts.red) {
          barCls = 'red';
          barText = `${dn} hosts: ${data.red.name} 🏠 &nbsp;&bull;&nbsp; ${fp(pts.red)}–${fp(pts.blue)}`;
        } else {
          barCls = 'flip';
          barText = `${dn} tied ${fp(pts.red)}–${fp(pts.blue)} &nbsp;&bull;&nbsp; Coin flip for host`;
        }
        h += `<div class="host-divider"><div class="host-divider-bar ${barCls}">${barText}</div></div>`;
      }
    }
  });
  h += `</div>`;

  h += `<div class="footer" style="padding-top:0.5rem">First to 24.5 wins &bull; 48 points available</div>`;

  document.getElementById('view-ryder').innerHTML = h;
}

function renderBoyne() {
  let h = '';
  h += `<div class="boyne-intro">
    <h2>Boyne Cup</h2>
    <p>FedEx points across 5 eligible rounds &bull; Best 3 of 5 count &bull; Determines starting strokes for the championship</p>
  </div>`;

  h += `<div class="content" style="padding-top:1rem">`;

  if (!fedex.showLeaderboard) {
    h += `<div class="side-card" style="text-align:center;padding:2rem 1rem">
      <div class="side-card-format" style="margin-bottom:0.5rem">Standings open after Round 1</div>
      <div class="match-detail">Eligible rounds: Irish Rumble, Lone Ranger, Blind Pairs, Worst Ball, 1v1 Matchplay</div>
    </div>`;
  } else {
    // Sort players by total descending
    const ranked = [...fedex.players].map(p => ({...p})).sort((a,b) => b.total - a.total);
    // Assign ranks (with ties)
    let lastTotal = null, lastRank = 0;
    ranked.forEach((p, i) => {
      if (p.total !== lastTotal) { lastRank = i + 1; lastTotal = p.total; }
      p.rank = lastRank;
    });

    h += `<table class="fedex-table">
      <thead>
        <tr>
          <th class="num">#</th>
          <th>Player</th>
          <th class="right">Total</th>
          <th class="right">Strokes</th>
        </tr>
      </thead>
      <tbody>`;
    const allZero = ranked.every(p => p.total === 0);
    ranked.forEach(p => {
      const strokes = startingStrokes(p.rank);
      let strokesDisp, strokesCls, rankDisp;
      if (allZero || p.total === 0) {
        strokesDisp = '—';
        strokesCls = 'zero';
        rankDisp = '—';
      } else {
        strokesDisp = strokes === 0 ? 'E' : strokes;
        strokesCls = strokes === 0 ? 'zero' : '';
        rankDisp = p.rank;
      }
      const rankCls = (!allZero && p.rank === 1 && p.total > 0) ? 'rank top' : 'rank';
      h += `<tr>
        <td class="${rankCls}">${rankDisp}</td>
        <td class="player">${p.first[0]}. ${p.last}${(p.first === 'Ryan' && p.last === 'Versolatto') ? ' <span class="champ-badge" title="2025 Boyne Cup Champion">★ \'25</span>' : ''}</td>
        <td class="right total">${p.total}</td>
        <td class="right strokes ${strokesCls}">${strokesDisp}</td>
      </tr>`;
    });
    h += `</tbody></table>`;
  }

  h += `<div class="fedex-legend">
    <strong>Scoring:</strong> Each eligible round, players earn points by net finish position (1st = 75, 2nd = 69, 3rd = 65, … 16th = 46). Ties split the points.<br>
    <strong>Best 3 of 5:</strong> Only your top 3 round scores count toward the FedEx total.<br>
    <strong>Starting strokes (Boyne Cup championship):</strong> 1st = -3 &bull; 2nd–3rd = -2 &bull; 4th–6th = -1 &bull; 7th–16th = even
  </div>`;

  h += `</div>`;
  document.getElementById('view-boyne').innerHTML = h;
}

// ═══════════════════════════════════════════════
// RENDER — SIDE ACTION
// ═══════════════════════════════════════════════

function renderSide() {
  let h = '';
  h += `<div class="side-intro">
    <h2>Side Action</h2>
    <p>Closest-to-pin &bull; Long Drive &bull; Skins &bull; By round</p>
  </div>`;

  h += `<div class="content" style="padding-top:1rem">`;

  sideAction.forEach(round => {
    const isUp = round.status === 'upcoming';
    const sLabel = round.status === 'final' ? 'Final' : round.status === 'live' ? '● Live' : 'Upcoming';
    const sClass = round.status === 'final' ? 'final' : (round.status === 'live' ? 'live' : '');

    h += `<div class="day-header">
      <span class="day-label">Day ${round.day} &bull; ${round.session}</span>
      <span class="day-line"></span>
      <span class="day-course">${round.course}</span>
    </div>`;

    h += `<div class="side-card${isUp?' upcoming':''}">
      <div class="side-card-header">
        <div class="side-card-format">${round.format}</div>
        <div class="side-card-status ${sClass}">${sLabel}</div>
      </div>
      <div class="side-card-detail">${round.detail}</div>`;

    // CTPs (each pays $20; optional sponsor message)
    h += `<div class="side-section">
      <div class="side-section-label">Closest to Pin</div>`;
    if (isUp || round.ctps.length === 0) {
      h += `<div class="side-empty">${isUp ? 'TBD' : 'No CTP winners recorded.'}</div>`;
    } else {
      round.ctps.forEach(c => {
        h += `<div class="side-row">
          <div class="label-l">${c.hole}</div>
          <div class="player-block">
            <div class="player">${c.player}</div>
            ${c.sponsor ? `<div class="sponsor">${c.sponsor}</div>` : ''}
          </div>
          <div class="meta">$20</div>
        </div>`;
      });
    }
    h += `</div>`;

    // Long Drive
    h += `<div class="side-section">
      <div class="side-section-label">Long Drive</div>`;
    if (isUp || !round.longDrive) {
      h += `<div class="side-empty">${isUp ? 'TBD' : 'No Long Drive winner recorded.'}</div>`;
    } else {
      h += `<div class="side-row">
        <div class="label-l">${round.longDrive.hole}</div>
        <div class="player-block">
          <div class="player">${round.longDrive.player}</div>
          ${round.longDrive.sponsor ? `<div class="sponsor">${round.longDrive.sponsor}</div>` : ''}
        </div>
      </div>`;
    }
    h += `</div>`;

    // Skins
    h += `<div class="side-section">
      <div class="side-section-label">Skins</div>`;
    if (isUp || round.skins.length === 0) {
      h += `<div class="side-empty">${isUp ? 'TBD' : 'No skins won (carryover or pot retained).'}</div>`;
    } else {
      // Header row
      h += `<div class="skins-header">
        <div class="sk-player">Player</div>
        <div class="sk-count">Skins</div>
        <div class="sk-payout">Payout</div>
      </div>`;
      round.skins.forEach(s => {
        h += `<div class="skins-row">
          <div class="sk-player">${s.player}</div>
          <div class="sk-count">${s.count}</div>
          <div class="sk-payout">$${s.payout}</div>
        </div>`;
      });
    }
    h += `</div>`;

    h += `</div>`; // side-card
  });

  h += `</div>`;
  document.getElementById('view-side').innerHTML = h;
}

// ═══════════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════════

function setupTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
      document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === `view-${tab}`));
      window.scrollTo({top: 0, behavior: 'instant'});
    });
  });
}

function renderAll() {
  renderRyder();
  renderBoyne();
  renderSide();
}

renderAll();
setupTabs();
window.addEventListener('resize', renderAll);
</script>
</body>
</html>
